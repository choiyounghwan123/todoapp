<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
    }
    .todo-container {
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }
    .todo-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .todo-item input[type="text"] {
      flex: 1;
      margin-right: 10px;
      padding: 10px;
    }
    .todo-item button {
      margin-left: 5px;
    }
  </style>
</head>
<body>
<div class="todo-container">
  <h1 class="text-center">To-Do List</h1>
  <div class="input-group mb-3">
    <input type="text" id="new-todo" class="form-control" placeholder="Enter new to-do">
    <div class="input-group-append">
      <button class="btn btn-primary" onclick="createTodo()">Add</button>
    </div>
  </div>
  <div id="todo-list"></div>
</div>

<script>
  const apiUrl = 'http://localhost:8080/api/todos'; // 실제 API 엔드포인트로 변경하세요.

  async function fetchTodos() {
    const response = await fetch(apiUrl);
    const todos = await response.json();
    const todoList = document.getElementById('todo-list');
    todoList.innerHTML = '';
    todos.forEach(todo => {
      const todoItem = document.createElement('div');
      todoItem.className = 'todo-item';
      todoItem.innerHTML = `
        <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodoCompletion(${todo.id}, this.checked)">
        <input type="text" class="form-control" value="${todo.title}" onchange="updateTodo(${todo.id}, this.value)">
        <button class="btn btn-danger" onclick="deleteTodo(${todo.id})">Delete</button>
      `;
      todoList.appendChild(todoItem);
    });
  }

  async function createTodo() {
    const newTodoInput = document.getElementById('new-todo');
    const newTodoText = newTodoInput.value;
    if (newTodoText === '') return;
    const response = await fetch(apiUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ title: newTodoText, description: '', completed: false })
    });
    if (response.ok) {
      newTodoInput.value = '';
      fetchTodos();
    }
  }

  async function updateTodo(id, title) {
    await fetch(`${apiUrl}/${id}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ title, description: '', completed: false })
    });
    fetchTodos();
  }

  async function toggleTodoCompletion(id, completed) {
    const response = await fetch(`${apiUrl}/${id}`);
    const todo = await response.json();
    await fetch(`${apiUrl}/${id}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ title: todo.title, description: todo.description, completed })
    });
    fetchTodos();
  }

  async function deleteTodo(id) {
    await fetch(`${apiUrl}/${id}`, {
      method: 'DELETE'
    });
    fetchTodos();
  }

  fetchTodos();
</script>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
